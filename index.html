<!DOCTYPE html>
<html>
<head>
<title>Runner Game</title>
<style>
  canvas { border: 2px solid black; background: skyblue; display: block; margin: auto; }
  body { text-align: center; font-family: Arial; }
</style>
</head>
<body>
<h2>Runner Game - Tap to Jump</h2>
<canvas id="game" width="800" height="400"></canvas>
<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let playerY = 300, vel = 0, jumping = false;
let obstacleX = 800, score = 0;
let lane = 1; // 0=left, 1=center, 2=right
let playerX = 299;
let targetX = 299;
let speed = 6;

// Jump with keyboard
document.addEventListener("keydown", e => {
  if(e.code==="Space"){ jumping=true; vel=-15; }
});

// Swipe / Tap controls
document.addEventListener('touchstart', e => {
  let x = e.touches[0].clientX;
  let y = e.touches[0].clientY;
  if(x < 266 && lane > 0){ lane--; } // left side
  if(x > 533 && lane < 2){ lane++; } // right side
  if(y < 200){ jumping=true; vel=-15; } // top tap = jump
  targetX = lane * 266 + 33;
});
canvas.addEventListener("click", jump);
canvas.addEventListener("click", jump);

function jump(){
  if(!jumping){ jumping=true; vel=-15; }
}

function gameLoop(){
  ctx.clearRect(0,0,800,400);
  
  // ground
  ctx.fillStyle = "green";
  ctx.fillRect(0,350,800,50);
  
  // jump physics
  if(jumping){
    playerY += vel;
    vel += 1;
    if(playerY >= 300){ playerY=300; jumping=false; }
  }
  
  // obstacle
  
  // smooth lane change
playerX += (targetX - playerX) * 0.2;
  obstacleX -= speed;
  // Collision check
let playerLane = playerX < 266? 0 : playerX < 533? 1 : 2;
let obstacleLane = obstacleX < 266? 0 : obstacleX < 533? 1 : 2;
if(obstacleX < 150 && obstacleX > 50 && playerLane == obstacleLane && playerY > 250){
  alert("Game Over! Score: " + score);
  obstacleX = 800;
  score = 0;
  speed = 6;
     }
  if( score % 5 == 0) speed += 0.5
  if(obstacleX < -50){ obstacleX=800; score++; }
  
  // draw player
  ctx.fillStyle = "red";
  ctx.fillRect(playerX, playerY, 50, 50);
  
  // draw obstacle
  ctx.fillStyle = "brown";
  ctx.fillRect(obstacleX, 300, 50, 50);
  
  // score
  ctx.fillStyle = "black";
  ctx.font = "30px Arial";
  ctx.fillText("Score: " + score, 10, 40);
  
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
